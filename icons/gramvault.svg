<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Vault door: outer ring -->
  <circle cx="64" cy="60" r="46" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="9"/>

  <!-- Vault spokes at 12, 3, 6, 9 o'clock -->
  <line x1="64" y1="14" x2="64" y2="26" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="94" x2="64" y2="106" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>
  <line x1="18" y1="60" x2="30" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>
  <line x1="98" y1="60" x2="110" y2="60" stroke="rgba(255,255,255,0.5)" stroke-width="5" stroke-linecap="round"/>

  <!-- Vault handle knob (right side, outside ring) -->
  <circle cx="112" cy="60" r="7" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="4"/>

  <!-- Bold "G" letterform inside the vault -->
  <!-- Arc: starts at top-right, sweeps most of the way around -->
  <path d="M 76 38 A 22 22 0 1 0 76 82"
        fill="none"
        stroke="white"
        stroke-width="9"
        stroke-linecap="round"/>
  <!-- G crossbar (horizontal bar going right from centre) -->
  <line x1="76" y1="60" x2="90" y2="60"
        stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Squiggly underline (grammar wavy line) — cyan teal -->
  <path d="M 36 90 Q 44 82 52 90 Q 60 98 68 90 Q 76 82 84 90 Q 92 98 100 90"
        fill="none"
        stroke="#67e8f9"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
