<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="128" height="128" rx="24" ry="24" fill="url(#bg)"/>

  <!-- Padlock shackle (U-arch): left side up, arc over top, right side down -->
  <path d="M 42 60 L 42 40 A 22 22 0 0 1 86 40 L 86 60"
        fill="none"
        stroke="rgba(255,255,255,0.9)"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Padlock body: rounded rectangle -->
  <rect x="22" y="54" width="84" height="62" rx="13" ry="13"
        fill="rgba(255,255,255,0.13)"
        stroke="rgba(255,255,255,0.9)"
        stroke-width="6"/>

  <!-- Bold G letterform — correct orientation, opens to the right
       Center: (60, 83), radius: 17
       Start: upper-right at ~-52° → (70, 70)
       End:   right-middle at   0° → (77, 83)
       large-arc=1, sweep=0 (counter-clockwise) → arcs left through top, left, bottom back to right -->
  <path d="M 70 70 A 17 17 0 1 0 77 83 L 63 83"
        fill="none"
        stroke="white"
        stroke-width="7.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Cyan squiggly underline — grammar wavy line -->
  <path d="M 32 100 Q 40 92 48 100 Q 56 108 64 100 Q 72 92 80 100 Q 88 108 96 100"
        fill="none"
        stroke="#67e8f9"
        stroke-width="4"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
