<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3730a3"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Vault door outer frame -->
  <rect x="10" y="10" width="108" height="108" rx="10" ry="10"
        fill="rgba(255,255,255,0.07)"
        stroke="rgba(255,255,255,0.75)"
        stroke-width="5"/>

  <!-- Vault door inner panel inset -->
  <rect x="17" y="17" width="94" height="94" rx="7" ry="7"
        fill="none"
        stroke="rgba(255,255,255,0.25)"
        stroke-width="2"/>

  <!-- Bolt handles — left -->
  <rect x="5"  y="42" width="8" height="10" rx="2" fill="rgba(255,255,255,0.8)"/>
  <rect x="5"  y="76" width="8" height="10" rx="2" fill="rgba(255,255,255,0.8)"/>

  <!-- Bolt handles — right -->
  <rect x="115" y="42" width="8" height="10" rx="2" fill="rgba(255,255,255,0.8)"/>
  <rect x="115" y="76" width="8" height="10" rx="2" fill="rgba(255,255,255,0.8)"/>

  <!-- G letterform — large, centered in door
       Center (64,54), radius 22
       Opens right: large-arc=1, sweep=0 (counter-clockwise)
       Start upper-right ~-50°, end right-middle 0°, crossbar to center -->
  <path d="M 77 38 A 22 22 0 1 0 86 54 L 66 54"
        fill="none"
        stroke="white"
        stroke-width="8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Red squiggly line — inside door, below G -->
  <path d="M 30 95 Q 39 87 48 95 Q 57 103 66 95 Q 75 87 84 95 Q 93 103 100 96"
        fill="none"
        stroke="#f87171"
        stroke-width="3.5"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
